appId: com.copilotmaestro.testapp
---
# 1. Login success
- launchApp:
    clearState: true
- tapOn:
    id: "login_email_input"
- inputText: "test@example.com"
- tapOn:
    id: "login_password_input"
- inputText: "password123"
- tapOn:
    id: "login_sign_button"
- assertVisible:
    id: "home_logout_button"

---
# 2. Login failure
- launchApp:
    clearState: true
- tapOn:
    id: "login_email_input"
- inputText: "wrong@example.com"
- tapOn:
    id: "login_password_input"
- inputText: "wrongpassword"
- tapOn:
    id: "login_sign_button"
- assertVisible: "Incorrect email or password"

---
# 3. Navigate to register
- launchApp:
    clearState: true
- tapOn:
    id: "login_register_button"
- assertVisible:
    id: "register_full_input"
